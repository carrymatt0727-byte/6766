<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上起訴系統 - 臺灣臺島地方檢察署</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header { background-color: var(--primary-dark); color: white; padding: 40px 0; margin-bottom: 40px; text-align: center; }
        .report-container { max-width: 800px; margin: 0 auto 60px; background: var(--bg-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit; }
        .submit-btn { background-color: var(--secondary-color); color: white; border: none; padding: 15px; width: 100%; border-radius: var(--radius-md); cursor: pointer; font-weight: 600; font-size: 1.1rem; }
    </style>
</head>
<body>
    <header class="main-header">
        </header>

    <main>
        <div class="page-header">
            <div class="container">
                <h1>線上起訴/案件登記系統</h1>
                <p>請詳實填寫相關資訊，本署將依職權受理</p>
            </div>
        </div>

        <div class="container">
            <div class="report-container">
                <form id="prosecutorForm">
                    <div class="form-group">
                        <label class="required">原告 (告訴人)</label>
                        <input type="text" id="plaintiff" class="form-control" placeholder="請輸入姓名" required>
                    </div>
                    <div class="form-group">
                        <label class="required">被告 (嫌疑人)</label>
                        <input type="text" id="defendant" class="form-control" placeholder="請輸入姓名/外號" required>
                    </div>
