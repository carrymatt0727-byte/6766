<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>內部管理系統 - 臺灣臺島地方檢察署</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f0f2f5; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .discord-btn { background-color: #5865F2; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        .discord-btn:hover { background-color: #4752c4; transform: translateY(-2px); }
        #admin-panel { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .admin-nav { background: #073763; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="login-section" class="admin-wrapper">
        <div class="login-card">
            <i class="fa-solid fa-shield-halved" style="font-size: 3rem; color: #073763; margin-bottom: 20px;"></i>
            <h2>檢察官後台登入</h2>
            <p style="color: #666; margin-bottom: 30px;">本頁面僅限授權檢察人員存取</p>
            <button onclick="loginWithDiscord()" class="discord-btn">
                <i class="fa-brands fa-discord"></i> 使用 Discord 驗證身分
            </button>
            <p id="status-msg" style="margin-top: 15px; font-size: 0.9rem; color: #cc0000;"></p>
        </div>
    </div>

    <div id="admin-panel">
        <nav class="admin-nav">
            <div><i class="fa-solid fa-gavel"></i> 案件管理系統後台</div>
            <div id="user-display">正在載入人員資訊...</div>
